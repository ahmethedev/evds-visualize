services:
  backend:
    build:
      context: ./backend
    environment:
      - EVDS_API_KEY=${EVDS_API_KEY}
      - CACHE_DB_PATH=/app/data/cache.db
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "https://api.makroturkiye.com"
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"

volumes:
  backend_data:
