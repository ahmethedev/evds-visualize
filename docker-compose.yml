services:
  backend:
    build:
      context: ./backend
    environment:
      - EVDS_API_KEY=${EVDS_API_KEY}
      - CACHE_DB_PATH=/app/data/cache.db
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  backend_data:
